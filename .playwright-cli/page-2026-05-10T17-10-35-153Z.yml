        - paragraph [ref=e151]: 这个单文件站点把原始 Markdown 的表格内容改造成文档站式浏览。它更接近 csdiy.wiki 和产品 documentation 的混合：左侧导航负责主题，顶部搜索负责找资源，中间内容可在手册、卡片、矩阵、路线之间切换。
