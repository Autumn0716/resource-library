      - generic [ref=e237]:
        - generic [ref=e291]:
          - heading "Introduction" [level=3] [ref=e292]
          - paragraph [ref=e293]: React Bits is an open-source collection of carefully designed UI components that aim to enhance your React web applications.
          - paragraph [ref=e294]: This is not your typical component library, which means you won't find a set of generic buttons, inputs, or other common UI elements here.
          - paragraph [ref=e295]: Basically, these components are here to help you stand out and make a statement visually by adding a touch of creativity to your projects.
          - separator [ref=e296]
          - heading "Mission" [level=3] [ref=e297]
          - paragraph [ref=e298]: The goal of React Bits is simple - provide flexible, visually stunning and most importantly, free components that take web projects to the next level.
          - paragraph [ref=e299]: "To make that happen, the project is committed to the following principles:"
          - list [ref=e300]:
            - listitem [ref=e301]: "Free For All: You own the code, and it's free to use in your projects"
            - listitem [ref=e302]: "Prop-First Approach: Easy customization through thoughtfully exposed props"
            - listitem [ref=e303]: "Fully Modular: Install strictly what you need, React Bits is not a dependency"
            - listitem [ref=e304]: "Free Choice: JS or TS, plain CSS or Tailwind, the code is all here"
          - heading "Free For All" [level=4] [ref=e305]
          - paragraph [ref=e306]: Every component you choose to bring into your project is yours to modify or extend, because you get full visibility of the code, not just an import.
          - heading "Prop-First Approach" [level=4] [ref=e307]
          - paragraph [ref=e308]: Every component is designed to be flexible and customizable, with props that allow you to adjust the look and feel without having to always dive into the code.
          - heading "Fully Modular" [level=4] [ref=e309]
          - paragraph [ref=e310]: React Bits is not your classic NPM library, you install only the components you need by either copying the code or using the CLI, without pulling in a whole library.
          - heading "Free Choice" [level=4] [ref=e311]
          - paragraph [ref=e312]: I don't want to dictate how you build your projects. Whether you prefer JavaScript or TypeScript, plain CSS or Tailwind, it's all here for you to use as you see fit.
          - paragraph [ref=e313]: P.S. The header has a neat dropdown to help you choose your preferred technologies.
          - separator [ref=e314]
          - heading "Performance" [level=3] [ref=e315]
          - paragraph [ref=e316]: "While we do everything possible to optimize components and offer the best experience, here are some tips to keep in mind when using React Bits:"
          - list [ref=e317]:
            - listitem [ref=e318]: "Less Is More: Using more than 2-3 components on a page is not advised, it can overload your page with animations, potentially impacting performance or UX"
            - listitem [ref=e319]: "Mobile Optimization: Consider disabling certain effects on mobile and replacing them with static placeholders instead"
            - listitem [ref=e320]: "Test Thoroughly: Your device may be high-end, but be considerate of your users - always test on multiple devices before going live"
          - link "Installation" [ref=e322] [cursor=pointer]:
            - /url: /get-started/installation
            - generic [ref=e323]: Installation
            - img [ref=e324]
